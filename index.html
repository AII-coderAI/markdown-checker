<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 格式审校专家</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        /* 标亮样式：更加显眼的黄色背景，保留代码风格 */
        mark { 
            background-color: #fde047; 
            color: #0f172a; 
            padding: 0.125rem 0.25rem; 
            border-radius: 0.25rem; 
            transition: background-color 0.2s;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        }
        mark:hover { background-color: #facc15; }

        #editor {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 15px;
            line-height: 1.7;
        }
        
        .markdown-body { 
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 15px; 
            line-height: 1.7; 
            color: #334155; 
            white-space: pre-wrap;
        }
        .markdown-body p { margin-bottom: 1.7em; } 
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: 600; color: #0f172a; margin-top: 1.7em; margin-bottom: 0.85em; }
        .markdown-body h1 { font-size: 1.25em; } 
        .markdown-body h2 { font-size: 1.1em; }
        .markdown-body code { background-color: #f1f5f9; padding: 0.2em 0.4em; border-radius: 0.25rem; color: #db2777; }
        .markdown-body pre { background-color: #f8fafc; padding: 1em; border-radius: 0.5rem; overflow-x: auto; border: 1px solid #e2e8f0; margin-bottom: 1.7em;}
        .markdown-body pre code { background-color: transparent; padding: 0; color: #334155; }
        .markdown-body blockquote { border-left: 4px solid #cbd5e1; padding-left: 1em; color: #64748b; font-style: italic; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">
    
    <header class="bg-white border-b border-slate-200 shrink-0 shadow-sm z-10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-600 p-2 rounded-xl shadow-sm shadow-indigo-200">
                    <i data-lucide="wand-2" class="w-5 h-5 text-white"></i>
                </div>
                <h1 class="text-lg md:text-xl font-bold tracking-tight text-slate-800">Markdown 格式审校专家</h1>
            </div>
            
            <div class="flex items-center gap-2 md:gap-4">
                <div id="statusIndicator" class="hidden md:flex items-center gap-2 text-sm font-medium text-slate-500 transition-all duration-300">
                    <i data-lucide="check-circle-2" class="w-4 h-4"></i> 就绪
                </div>
                
                <button onclick="toggleSettings()" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors" title="设置 API Key">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <div id="settingsModal" class="hidden fixed inset-0 bg-slate-900/30 backdrop-blur-sm z-50 flex items-center justify-center transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 m-4 transform transition-transform">
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-lg font-bold flex items-center gap-2 text-slate-800">
                    <div class="bg-indigo-100 p-1.5 rounded-lg">
                        <i data-lucide="settings-2" class="w-4 h-4 text-indigo-600"></i>
                    </div>
                    模型与 API 配置
                </h2>
                <button onclick="toggleSettings()" class="text-slate-400 hover:text-slate-600 hover:bg-slate-100 p-1 rounded-md transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">AI 提供商</label>
                    <select id="providerSelect" onchange="handleProviderChange()" class="w-full p-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-colors text-sm text-slate-700">
                        <option value="aliyun">阿里云百炼 (DashScope)</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="siliconflow">硅基流动 (SiliconFlow)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">模型名称 (可下拉选择或手动输入)</label>
                    <input type="text" id="modelInput" list="modelOptions" class="w-full p-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-colors text-sm font-mono text-slate-700" placeholder="点击右侧箭头选择...">
                    <datalist id="modelOptions"></datalist>
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1.5">API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="请输入对应的 API Key..." class="w-full p-2.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-colors text-sm font-mono text-slate-700">
                </div>
            </div>

            <div class="flex justify-end gap-3">
                <button onclick="toggleSettings()" class="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">取消</button>
                <button onclick="saveSettings()" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 shadow-sm shadow-indigo-200 rounded-xl transition-colors flex items-center gap-2">
                    <i data-lucide="save" class="w-4 h-4"></i> 保存配置
                </button>
            </div>
        </div>
    </div>

    <main class="flex-1 max-w-[1600px] w-full mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 min-h-0">
        <div class="flex flex-col gap-3 h-full min-h-0">
            <div class="flex items-center justify-between px-1 shrink-0">
                <div class="flex items-center gap-2 text-slate-600 text-sm font-semibold tracking-wide">
                    <i data-lucide="file-edit" class="w-4 h-4 text-indigo-500"></i> 原始文本
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="clearInput()" class="flex items-center gap-1.5 text-xs font-medium text-slate-400 hover:text-red-500 transition-colors px-2 py-1.5 rounded-md hover:bg-red-50">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i> 清空
                    </button>
                    <button id="checkBtn" onclick="processText()" class="flex items-center gap-1.5 text-xs font-medium text-white bg-indigo-500 hover:bg-indigo-600 shadow-sm transition-colors px-4 py-1.5 rounded-lg">
                        <i data-lucide="sparkles" class="w-3.5 h-3.5"></i> 开始检查
                    </button>
                </div>
            </div>
            <textarea id="editor" placeholder="在此输入或粘贴 Markdown 文本。输入完毕后，点击右上角的【开始检查】按钮..." class="flex-1 w-full p-6 rounded-2xl border border-slate-200 bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none resize-none transition-all shadow-sm text-slate-700"></textarea>
        </div>

        <div class="flex flex-col gap-3 h-full min-h-0">
            <div class="flex items-center justify-between px-1 shrink-0">
                <div class="flex items-center gap-2 text-slate-600 text-sm font-semibold tracking-wide">
                    <i data-lucide="eye" class="w-4 h-4 text-emerald-500"></i> 预览结果 (纯源码展示)
                </div>
                <button onclick="copyResult()" id="copyBtn" class="flex items-center gap-1.5 text-xs font-medium text-indigo-600 hover:text-indigo-700 transition-colors px-2 py-1 rounded-md hover:bg-indigo-50 opacity-0 pointer-events-none">
                    <i data-lucide="copy" class="w-3.5 h-3.5"></i> 复制纯净文本
                </button>
            </div>
            
            <div class="relative flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div id="emptyState" class="absolute inset-0 flex flex-col items-center justify-center p-8 text-center text-slate-400 bg-slate-50/50">
                    <div class="bg-white p-4 rounded-full shadow-sm mb-4">
                        <i data-lucide="sparkles" class="w-8 h-8 text-indigo-300"></i>
                    </div>
                    <p class="text-sm font-medium text-slate-500">等待检查</p>
                    <p class="text-xs text-slate-400 mt-1">左侧输入完成后，点击【开始检查】按钮进行处理</p>
                </div>
                <div id="preview" class="flex-1 overflow-y-auto p-6 markdown-body hidden"></div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const emptyState = document.getElementById('emptyState');
        const statusIndicator = document.getElementById('statusIndicator');
        const settingsModal = document.getElementById('settingsModal');
        const providerSelect = document.getElementById('providerSelect');
        const modelInput = document.getElementById('modelInput');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const copyBtn = document.getElementById('copyBtn');
        const modelOptions = document.getElementById('modelOptions');
        const checkBtn = document.getElementById('checkBtn');

        let currentOutput = '';
        let currentAbortController = null;

        // 【核心修改】极其严苛的高亮规则和符号识别规则，附带正反面示例
        const SYSTEM_INSTRUCTION = `你是一个严谨的 Markdown 格式审校程序。你的任务是接收原始文本，严格按照以下规则处理，并且必须且只能将【真正修改过】的地方用 <mark> 和 </mark> 标签包裹。

【处理范围限制】（绝对不允许修改或标亮以下两点之外的任何内容！）：
1. 标点符号替换：将文中所有的中文逗号“，”全部替换为英文逗号“,”；将所有的中文句号“。”全部替换为英文句号“.”。
2. 严格的 LaTeX 转换：精准识别文本中所有未规范书写的化学式（如 H2O）、数学公式、上标下标（如 m2, O2, x_1）、左右箭头（如 ->, =>, <->）、特殊数学/科学符号等，将它们严格转换为标准的 LaTeX 语法。行内公式用 $...$，独立公式用 $$...$$，化学式必须用 \\ce{...}。

【极其严格的高亮 (<mark>) 要求】：
- 凡是进行了 LaTeX 转换的地方，**必须**将完整的 LaTeX 代码（连同外层的 $ 或 $$ 符号）用 <mark> 标签完整包裹！
- 【正确示范】：水分子是 <mark>$\\ce{H2O}$</mark><mark>,</mark> 反应为 <mark>$A \\rightarrow B$</mark><mark>.</mark>
- 【错误示范】（千万不要把 mark 写在 $ 里面！）：$<mark>\\ce{H2O}</mark>$
- 如果原文中的公式【已经使用了】正确的 LaTeX 语法，绝对不能用 <mark> 包裹它！直接原样输出。
- 绝对不能用 <mark> 标签包裹纯空白字符（如空格、换行符）。
- 保持原文的换行、段落和空格结构绝对不变。
- 只输出处理后的纯文本，不要带有任何解释或废话。`;

        const DEFAULT_MODELS = {
            aliyun: 'qwen-plus', 
            gemini: 'gemini-1.5-flash',
            siliconflow: 'Qwen/Qwen3-VL-235B-A22B-Thinking'
        };

        const MODEL_LISTS = {
            aliyun: [
                'qwen-plus',
                'qwen-turbo',
                'qwen-max',
                'qwen2.5-72b-instruct'
            ],
            gemini: [
                'gemini-1.5-flash',
                'gemini-1.5-pro',
                'gemini-2.0-flash'
            ],
            siliconflow: [
                'Qwen/Qwen3-VL-235B-A22B-Thinking',
                'deepseek-ai/DeepSeek-V3.1-Terminus',
                'deepseek-ai/DeepSeek-V3',
                'Qwen/Qwen2.5-72B-Instruct',
                'THUDM/glm-4-9b-chat'
            ]
        };

        function getSettings() {
            const provider = localStorage.getItem('ai_provider_v4') || 'aliyun';
            const model = localStorage.getItem('ai_model_v4_' + provider) || DEFAULT_MODELS[provider];
            let encodedKey = localStorage.getItem('api_key_v4_' + provider);
            let key = encodedKey ? atob(encodedKey) : '';

            if (provider === 'aliyun' && !key) {
                key = 'sk-c444d20f38bb42579b386edad32c7810';
            }

            return { provider, model, key };
        }

        function populateModelList(provider) {
            modelOptions.innerHTML = '';
            MODEL_LISTS[provider].forEach(modelName => {
                const option = document.createElement('option');
                option.value = modelName;
                modelOptions.appendChild(option);
            });
        }

        function handleProviderChange() {
            const provider = providerSelect.value;
            populateModelList(provider);
            
            const savedModel = localStorage.getItem('ai_model_v4_' + provider);
            modelInput.value = savedModel || DEFAULT_MODELS[provider];
            
            const encodedKey = localStorage.getItem('api_key_v4_' + provider);
            let keyToFill = encodedKey ? atob(encodedKey) : '';
            if (provider === 'aliyun' && !keyToFill) keyToFill = 'sk-c444d20f38bb42579b386edad32c7810';
            apiKeyInput.value = keyToFill;
        }

        function toggleSettings() {
            if (settingsModal.classList.contains('hidden')) {
                const { provider, model, key } = getSettings();
                providerSelect.value = provider;
                populateModelList(provider);
                modelInput.value = model;
                apiKeyInput.value = key;
                settingsModal.classList.remove('hidden');
            } else {
                settingsModal.classList.add('hidden');
            }
        }

        function saveSettings() {
            const provider = providerSelect.value;
            const model = modelInput.value.trim();
            const key = apiKeyInput.value.trim();

            if (!key) return alert('请输入有效的 API Key');
            if (!model) return alert('请输入模型名称');

            localStorage.setItem('ai_provider_v4', provider);
            localStorage.setItem('ai_model_v4_' + provider, model);
            localStorage.setItem('api_key_v4_' + provider, btoa(key));

            toggleSettings();
            setStatus('success', '配置已保存');
        }

        let isSyncingLeft = false, isSyncingRight = false;

        editor.addEventListener('scroll', () => {
            if (!isSyncingLeft) {
                isSyncingRight = true;
                const scrollable = editor.scrollHeight - editor.clientHeight;
                if (scrollable > 0) preview.scrollTop = (editor.scrollTop / scrollable) * (preview.scrollHeight - preview.clientHeight);
            }
            isSyncingLeft = false;
        });

        preview.addEventListener('scroll', () => {
            if (!isSyncingRight) {
                isSyncingLeft = true;
                const scrollable = preview.scrollHeight - preview.clientHeight;
                if (scrollable > 0) editor.scrollTop = (preview.scrollTop / scrollable) * (editor.scrollHeight - editor.clientHeight);
            }
            isSyncingRight = false;
        });

        function setStatus(type, text) {
            statusIndicator.classList.remove('hidden');
            let icon = '', colorClass = '';
            
            if (type === 'loading') {
                icon = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
                colorClass = 'text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full';
            } else if (type === 'success') {
                icon = '<i data-lucide="check-circle-2" class="w-4 h-4"></i>';
                colorClass = 'text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full';
            } else if (type === 'error') {
                icon = '<i data-lucide="alert-circle" class="w-4 h-4"></i>';
                colorClass = 'text-red-600 bg-red-50 px-3 py-1.5 rounded-full';
            } else {
                icon = '<i data-lucide="check-circle-2" class="w-4 h-4"></i>';
                colorClass = 'text-slate-500';
                statusIndicator.classList.add('hidden');
            }

            statusIndicator.className = `md:flex items-center gap-2 text-sm font-medium transition-all duration-300 ${colorClass}`;
            statusIndicator.innerHTML = `${icon} <span class="flex items-center">${text}</span>`;
            lucide.createIcons();
        }

        async function processText() {
            const text = editor.value;
            if (!text.trim()) {
                emptyState.classList.remove('hidden');
                preview.classList.add('hidden');
                copyBtn.classList.add('opacity-0', 'pointer-events-none');
                setStatus('idle', '就绪');
                return;
            }

            const { provider, model, key } = getSettings();
            if (!key) {
                setStatus('error', '请先配置 API Key');
                toggleSettings();
                return;
            }

            if (currentAbortController) {
                currentAbortController.abort();
            }
            currentAbortController = new AbortController();
            const signal = currentAbortController.signal;

            setStatus('loading', '正在处理检查...');
            preview.style.opacity = '0.5';
            
            if (checkBtn) {
                checkBtn.disabled = true;
                checkBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }

            try {
                let resultText = '';

                if (provider === 'gemini') {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        signal: signal,
                        body: JSON.stringify({
                            systemInstruction: { parts: [{ text: SYSTEM_INSTRUCTION }] },
                            contents: [{ parts: [{ text }] }],
                            generationConfig: { temperature: 0.1 }
                        })
                    });

                    if (!response.ok) throw new Error((await response.json()).error?.message || 'API 请求失败');
                    resultText = (await response.json()).candidates[0].content.parts[0].text;
                } 
                else if (provider === 'siliconflow' || provider === 'aliyun') {
                    const url = provider === 'aliyun' 
                        ? 'https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions'
                        : 'https://api.siliconflow.cn/v1/chat/completions';
                        
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                        signal: signal,
                        body: JSON.stringify({
                            model: model,
                            messages: [
                                { role: 'system', content: SYSTEM_INSTRUCTION },
                                { role: 'user', content: text }
                            ],
                            temperature: 0.1
                        })
                    });

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(errData.message || errData.error?.message || 'API 请求失败');
                    }
                    resultText = (await response.json()).choices[0].message.content;
                }

                // 前端兜底：剔除包含纯空白或换行符的 mark 标签
                resultText = resultText.replace(/<mark>([\s\n]+)<\/mark>/g, '$1');
                resultText = resultText.replace(/<mark><\/mark>/g, '');

                currentOutput = resultText;
                renderPreview(resultText);
                
                emptyState.classList.add('hidden');
                preview.classList.remove('hidden');
                copyBtn.classList.remove('opacity-0', 'pointer-events-none');
                preview.style.opacity = '1';
                setStatus('success', '已完成格式校对');

            } catch (error) {
                if (error.name === 'AbortError') return; 
                console.error(error);
                setStatus('error', '检查失败: ' + error.message);
                preview.style.opacity = '1';
            } finally {
                if (checkBtn) {
                    checkBtn.disabled = false;
                    checkBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            }
        }

        function renderPreview(markdownText) {
            const mathBlocks = [];
            let processedText = markdownText;
            
            // 提取并保护包含 LaTeX 语法的模块（包括可能被 <mark> 包裹的情况）
            const mathRegex = /(<mark>\$\$[\s\S]*?\$\$<\/mark>|<mark>\$(?!\s)[^\$]*?(?!\s)\$<\/mark>|<mark>\\\[[\s\S]*?\\\]<\/mark>|<mark>\\\(.*?\\\)<\/mark>|\$\$[\s\S]*?\$\$|\$(?!\s)[^\$]*?(?!\s)\$|\\\[[\s\S]*?\\\]|\\\(.*?\\\))/g;
            
            processedText = processedText.replace(mathRegex, (match) => {
                const placeholder = `@@MATHBLOCK${mathBlocks.length}@@`;
                const safeMatch = match.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
                mathBlocks.push(safeMatch);
                return placeholder;
            });

            marked.setOptions({ breaks: true });
            let html = marked.parse(processedText);
            
            // 将保护好的纯文本代码还原回 HTML，并将刚才转移的 <mark> 标签恢复回来
            mathBlocks.forEach((block, index) => {
                const placeholder = `@@MATHBLOCK${index}@@`;
                const restoredBlock = block.replace(/&lt;mark&gt;/g, '<mark>').replace(/&lt;\/mark&gt;/g, '</mark>');
                html = html.split(placeholder).join(restoredBlock);
            });

            preview.innerHTML = html;
        }

        function clearInput() {
            editor.value = '';
            currentOutput = '';
            emptyState.classList.remove('hidden');
            preview.classList.add('hidden');
            copyBtn.classList.add('opacity-0', 'pointer-events-none');
            setStatus('idle', '就绪');
            editor.focus();
        }

        function copyResult() {
            if (!currentOutput) return;
            const cleanText = currentOutput.replace(/<mark>|<\/mark>/g, '');
            navigator.clipboard.writeText(cleanText).then(() => {
                const originalHtml = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5"></i> 复制成功';
                copyBtn.classList.replace('text-indigo-600', 'text-emerald-600');
                lucide.createIcons();
                
                setTimeout(() => {
                    copyBtn.innerHTML = originalHtml;
                    copyBtn.classList.replace('text-emerald-600', 'text-indigo-600');
                    lucide.createIcons();
                }, 2000);
            });
        }
    </script>
</body>
</html>
